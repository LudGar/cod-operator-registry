<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>COD Operator Registry</title>
      <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="styles.css">
   </head>
   <body>
      <div id="app">
         <div id="view-registry">
            <header>
               <div class="header-inner">
                  <div class="header-top">
                     <div style="display:flex;align-items:center;gap:14px;flex-shrink:0">
                        <div class="logo">COD</div>
                        <div>
                           <div class="header-title">OPERATOR REGISTRY</div>
                           <div class="header-sub" id="header-sub"></div>
                        </div>
                     </div>
                     <div class="search-wrap">
                        <input id="search-input" type="text" placeholder="SEARCH OPERATORS..." />
                        <span class="search-icon">&#9906;</span>
                     </div>
                  </div>
                  <div class="game-tabs" id="game-tabs"></div>
               </div>
            </header>
            <main>
               <div class="controls">
                  <div class="cross-legend"><span class="cross-dot">N</span>CROSS-GAME</div>
                  <div style="flex:1"></div>
                  <span class="ops-count" id="ops-count"></span>
                  <button class="view-btn active" id="btn-grid">&#8862;</button>
                  <button class="view-btn"        id="btn-list">&#8801;</button>
               </div>
               <div class="game-banner" id="game-banner">
                  <span class="game-banner-year" id="banner-year"></span>
                  <span class="game-banner-name" id="banner-name"></span>
               </div>
               <div id="empty-msg">NO OPERATORS FOUND</div>
               <div id="grid-view"></div>
               <div id="list-view"></div>
            </main>
            <footer>COD OPERATOR REGISTRY &middot; MWII &middot; MWIII &middot; BO6 &middot; BO7</footer>
         </div>
         <div id="view-detail">
            <div class="detail-glow" id="detail-glow"></div>
            <div class="detail-content">
               <div class="back-bar">
                  <button class="back-btn" id="back-btn">&#8592; BACK</button>
                  <span class="breadcrumb" id="detail-breadcrumb"></span>
               </div>
               <!-- // OPERATOR BIO header -->
               <div class="bio-header">// <span>OPERATOR BIO</span></div>
               <div class="detail-layout">
                  <!-- Portrait column -->
                  <div class="detail-portrait-col">
                     <div class="detail-portrait" id="detail-portrait"></div>
                     <div class="detail-game-badges" id="detail-game-badges"></div>
                  </div>
                  <!-- Bio column -->
                  <div class="detail-bio-col">
                     <div class="bio-name-block">
                        <div class="bio-field-label">NAME</div>
                        <div class="bio-name" id="detail-name"></div>
                        <div class="bio-iname" id="detail-iname" style="display:none"></div>
                     </div>
                     <div class="bio-row">
                        <div class="bio-cell">
                           <div class="bio-cell-label">CITIZENSHIP</div>
                           <div class="bio-cell-value" id="bio-citizenship">&#8212;</div>
                        </div>
                        <div class="bio-cell">
                           <div class="bio-cell-label">LANGUAGE</div>
                           <div class="bio-cell-value" id="bio-language">&#8212;</div>
                        </div>
                     </div>
                     <div class="bio-row">
                        <div class="bio-cell">
                           <div class="bio-cell-label">FACTION AFFILIATION</div>
                           <div class="bio-cell-value" id="bio-faction">&#8212;</div>
                        </div>
                        <div class="bio-cell">
                           <div class="bio-cell-label">STATUS</div>
                           <div class="bio-cell-value" id="bio-status">&#8212;</div>
                        </div>
                     </div>
                     <div class="bio-background">
                        <div class="bio-bg-label">BACKGROUND</div>
                        <div class="bio-bg-text" id="bio-background"></div>
                     </div>
                  </div>
               </div>
               <!-- Skins -->
               <div class="skins-header">
                  <span class="skins-label" id="skins-label">&#9672; APPEARANCES</span>
                  <span class="skins-count" id="skins-count"></span>
                  <div class="skins-line"></div>
               </div>
               <div class="skins-grid" id="skins-grid"></div>
            </div>
         </div>
      </div>
      <script src="app.js"></script>
   </body>
</html>
