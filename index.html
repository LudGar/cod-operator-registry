<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COD Operator Registry</title>
<link href="./styles.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #080a0c; color: #c8cdd4; font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0c0e11; }
  ::-webkit-scrollbar-thumb { background: #1e2430; border-radius: 3px; }

  #view-registry { display: block; }
  #view-detail   { display: none; }

  header {
    border-bottom: 1px solid #1a1f25;
    background: linear-gradient(180deg,#0c0e11 0%,#080a0c 100%);
    padding: 0 24px; position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 1400px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 16px; }
  .logo { width:32px; height:32px; background:linear-gradient(135deg,#ff2244,#cc0022); display:flex; align-items:center; justify-content:center; font-family:'Courier New',monospace; font-weight:700; font-size:12px; color:#fff; flex-shrink:0; }
  .header-title { font-weight:800; font-size:18px; letter-spacing:.08em; color:#e8eaec; line-height:1; }
  .header-sub   { font-family:'Courier New',monospace; font-size:9px; color:#3a4250; letter-spacing:.15em; margin-top:2px; }
  .search-wrap  { position:relative; width:220px; flex-shrink:0; }
  .search-wrap input { width:100%; background:#0d1014; border:1px solid #1e2430; color:#c8cdd4; padding:7px 32px 7px 12px; font-family:'Courier New',monospace; font-size:10px; letter-spacing:.1em; outline:none; caret-color:#ff2244; }
  .search-icon { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:#2a3040; pointer-events:none; }

  .game-tabs { display:flex; flex-wrap:wrap; padding-bottom:1px; }
  .game-tab { padding:8px 12px; border:none; cursor:pointer; font-family:'Courier New',monospace; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; background:transparent; transition:all .15s; border-bottom:2px solid transparent; color:#3a4250; }
  .game-tab.all { padding:8px 14px; letter-spacing:.1em; }
  .game-tab.active-all { background:#ff2244; color:#fff; border-bottom-color:#ff2244; }

  main { max-width:1400px; margin:0 auto; padding:20px 24px 80px; }
  .controls { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .cross-legend { display:flex; align-items:center; gap:6px; padding:4px 10px; border:1px solid #1e2226; font-family:'Courier New',monospace; font-size:9px; color:#3a4250; letter-spacing:.08em; }
  .cross-dot { width:16px; height:16px; border-radius:50%; background:#ff2244; display:inline-flex; align-items:center; justify-content:center; font-family:'Courier New',monospace; font-size:8px; font-weight:700; color:#fff; flex-shrink:0; }
  .ops-count { font-family:'Courier New',monospace; font-size:10px; color:#3a4250; }
  .view-btn { width:28px; height:28px; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; background:transparent; color:#3a4250; transition:all .15s; }
  .view-btn.active { background:#1e2430; color:#c8cdd4; }

  .game-banner { display:none; margin-bottom:16px; padding:10px 16px; align-items:center; gap:12px; }
  .game-banner.visible { display:flex; }
  .game-banner-year { font-family:'Courier New',monospace; font-size:9px; letter-spacing:.15em; }
  .game-banner-name { font-weight:700; font-size:14px; letter-spacing:.05em; color:#e8eaec; }

  #grid-view { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:6px; }
  #list-view  { display:none; }
  #empty-msg  { display:none; text-align:center; padding:60px 20px; font-family:'Courier New',monospace; color:#2a3040; font-size:12px; letter-spacing:.15em; }

  .op-card { position:relative; cursor:pointer; background:linear-gradient(135deg,#111416 0%,#0d0f11 100%); border:1px solid #1e2226; padding:12px 14px; transition:all .18s ease; overflow:hidden; }
  .card-scanlines { position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px); }
  .card-inner { display:flex; align-items:flex-start; gap:10px; position:relative; }
  .card-avatar { width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Courier New',monospace; font-weight:700; font-size:13px; letter-spacing:.05em; position:relative; }
  .multi-badge { position:absolute; top:-4px; right:-4px; width:10px; height:10px; background:#ff2244; border-radius:50%; border:1px solid #080a0c; display:flex; align-items:center; justify-content:center; font-size:7px; color:#fff; font-family:'Courier New',monospace; font-weight:700; }
  .card-info { flex:1; min-width:0; }
  .card-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; color:#e8eaec; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-faction { font-family:'Courier New',monospace; font-size:8px; color:#4a5260; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-iname   { font-family:'Courier New',monospace; font-size:8px; color:#2a3a42; letter-spacing:.06em; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .appearance-line { display:flex; align-items:center; gap:5px; margin-top:3px; }
  .season-tag { font-family:'Courier New',monospace; font-size:8px; color:#4a5260; }
  /* portrait images */
  .card-avatar { overflow:hidden; }
  .card-avatar img { display:block; width:100%; height:100%; object-fit:cover; object-position:top center; }
  .card-avatar .av-ini { display:flex; width:100%; height:100%; align-items:center; justify-content:center; }
  .detail-avatar img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:top center; }
  .detail-avatar .av-ini { position:relative; z-index:1; }
  .detail-iname { font-family:'Courier New',monospace; font-size:10px; color:#2a3a42; letter-spacing:.12em; margin-top:6px; }

  .game-badge { display:inline-block; border-radius:2px; font-family:'Courier New',monospace; font-weight:700; text-transform:uppercase; white-space:nowrap; }
  .game-badge.sm { padding:1px 5px; font-size:8px; }
  .game-badge.md { padding:2px 7px; font-size:10px; }

  .list-row { display:flex; align-items:center; gap:12px; padding:8px 14px; background:#0d0f11; border:1px solid #1a1f25; transition:all .15s; cursor:pointer; }
  .list-row:hover { background:#111416; }
  .list-name { font-weight:700; font-size:13px; color:#d8dce0; width:150px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .list-faction { font-family:'Courier New',monospace; font-size:9px; color:#3a4250; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .list-aps { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; align-items:center; }
  .list-ap { display:flex; align-items:center; gap:4px; }

  footer { margin-top:40px; padding:16px 24px; border-top:1px solid #1a1f25; font-family:'Courier New',monospace; font-size:9px; color:#252b35; letter-spacing:.12em; text-align:center; }

  /* ── Detail page ── */
  #view-detail { background:#080a0c; min-height:100vh; overflow-y:auto; }
  .detail-glow { position:fixed; top:0; left:0; right:0; height:500px; pointer-events:none; z-index:0; }
  .detail-content { max-width:960px; margin:0 auto; padding:0 28px 100px; position:relative; z-index:1; }

  .back-bar { display:flex; align-items:center; gap:12px; padding:18px 0 14px; border-bottom:1px solid #1a1f25; margin-bottom:28px; }
  .back-btn { display:flex; align-items:center; gap:8px; background:transparent; border:1px solid #1e2430; color:#6a7280; padding:6px 14px; cursor:pointer; font-family:'Courier New',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; transition:all .15s; }
  .breadcrumb { font-family:'Courier New',monospace; font-size:9px; color:#2a3040; letter-spacing:.15em; }

  /* main bio layout: portrait left, bio right */
  .detail-layout { display:grid; grid-template-columns:220px 1fr; gap:32px; align-items:start; }

  /* portrait column */
  .detail-portrait-col { display:flex; flex-direction:column; gap:12px; }
  .detail-portrait {
    width:220px; height:280px; position:relative; overflow:hidden;
    clip-path:polygon(8% 0%,92% 0%,100% 8%,100% 92%,92% 100%,8% 100%,0% 92%,0% 8%);
  }
  .detail-portrait img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
  .detail-portrait .av-ini {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-family:'Courier New',monospace; font-weight:700; font-size:64px; letter-spacing:.02em;
  }
  .detail-portrait-badge {
    position:absolute; top:8px; right:8px; background:#ff2244;
    border-radius:50%; width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Courier New',monospace; font-size:9px; font-weight:700; color:#fff;
    border:2px solid #080a0c;
  }
  .detail-game-badges { display:flex; flex-direction:column; gap:3px; }
  .detail-game-badge-row { display:flex; align-items:center; justify-content:center; padding:5px 8px; border:1px solid; }

  /* bio column */
  .bio-header { font-family:'Courier New',monospace; font-size:10px; color:#3a4250; letter-spacing:.2em; margin-bottom:20px; }
  .bio-header span { color:#4a5a68; }

  .bio-name-block { margin-bottom:20px; border-bottom:1px solid #1a1f25; padding-bottom:16px; }
  .bio-field-label { font-family:'Courier New',monospace; font-size:9px; color:#4a5260; letter-spacing:.18em; text-transform:uppercase; margin-bottom:6px; }
  .bio-name { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:clamp(40px,6vw,72px); color:#e8eaec; letter-spacing:.06em; line-height:.9; text-transform:uppercase; }
  .bio-iname { font-family:'Courier New',monospace; font-size:9px; color:#2a3a42; letter-spacing:.12em; margin-top:6px; }

  .bio-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .bio-cell { background:#0d0f11; border:1px solid #1a1f25; padding:8px 12px; }
  .bio-cell-label { font-family:'Courier New',monospace; font-size:8px; color:#3a4250; letter-spacing:.18em; text-transform:uppercase; margin-bottom:5px; }
  .bio-cell-value { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:16px; color:#c8cdd4; letter-spacing:.03em; }
  .bio-cell-value.status-active  { color:#66bb66; }
  .bio-cell-value.status-kia     { color:#ff4444; }
  .bio-cell-value.status-unknown { color:#ffaa44; }

  .bio-background { margin-top:16px; }
  .bio-bg-label { font-family:'Courier New',monospace; font-size:9px; color:#4a5260; letter-spacing:.18em; text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #1a1f25; }
  .bio-bg-text { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:400; color:#7a8898; line-height:1.7; }
  .bio-bg-text p + p { margin-top:10px; }
  .bio-classified { font-family:'Courier New',monospace; font-size:10px; color:#2a3040; letter-spacing:.15em; font-style:italic; }

  @keyframes pageIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .page-in { animation:pageIn .2s cubic-bezier(.16,1,.3,1); }

  @media(max-width:700px){
    .detail-layout { grid-template-columns:1fr; }
    .detail-portrait { width:100%; height:220px; }
    .bio-row { grid-template-columns:1fr 1fr; }
    .detail-content { padding:0 16px 80px; }
  }



  /* ── Skins section ── */
  .skins-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; margin-top:48px; }
  .skins-label { font-family:'Courier New',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; }
  .skins-count { font-family:'Courier New',monospace; font-size:10px; color:#3a4250; letter-spacing:.1em; }
  .skins-line  { flex:1; height:1px; background:#1a1f25; }

  .skins-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }

  .skin-card {
    position:relative; overflow:hidden; cursor:default;
    aspect-ratio:3/4;
    background:#0d0f11;
    border:1px solid #1e2430;
    transition:border-color .15s, transform .15s, box-shadow .15s;
  }
  .skin-card:hover { transform:translateY(-3px); }

  /* full-bleed background: pattern fills entire card */
  .skin-bg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:top center;
  }
  .skin-bg-svg {
    position:absolute; inset:0; width:100%; height:100%;
  }

  /* dark gradient overlay at bottom for text legibility */
  .skin-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.3) 40%, transparent 70%);
  }

  /* name label pinned bottom-left */
  .skin-name {
    position:absolute; bottom:0; left:0; right:0;
    padding:10px 12px 10px;
    font-family:'Barlow Condensed',sans-serif; font-weight:800;
    font-size:15px; color:#e8eaec; letter-spacing:.08em;
    text-transform:uppercase; line-height:1;
    z-index:2;
  }
  .skin-name .skin-sub {
    display:block; font-size:9px; font-weight:400;
    font-family:'Courier New',monospace; color:#6a7888;
    letter-spacing:.12em; margin-bottom:4px;
  }

  /* ── MW5 faction split ── */
  .faction-split { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .faction-col { min-width:0; }
  .faction-col:first-child { border-right:1px solid #1a1f25; padding-right:16px; }
  .faction-col:last-child  { padding-left:0; }
  .faction-header {
    display:flex; align-items:center; gap:10px;
    padding:6px 0 10px; margin-bottom:8px;
    border-bottom:2px solid;
    font-family:'Courier New',monospace; font-weight:700; font-size:11px;
    letter-spacing:.18em; text-transform:uppercase;
  }
  .faction-header .fh-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .faction-col-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:6px; }
  .faction-col-list { display:flex; flex-direction:column; gap:3px; }

  @media(max-width:700px){
    .faction-split { grid-template-columns:1fr; }
    .faction-col:first-child { border-right:none; padding-right:0; border-bottom:1px solid #1a1f25; padding-bottom:24px; margin-bottom:8px; }
  }

  @media (max-width:600px) {
    .detail-hero { grid-template-columns:1fr; }
    .detail-avatar { width:90px; height:90px; font-size:28px; }
    .stat-grid { grid-template-columns:1fr 1fr; }
    .detail-content { padding:0 16px 100px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="view-registry">
    <header>
      <div class="header-inner">
        <div class="header-top">
          <div style="display:flex;align-items:center;gap:14px;flex-shrink:0">
            <div class="logo">COD</div>
            <div>
              <div class="header-title">OPERATOR REGISTRY</div>
              <div class="header-sub" id="header-sub"></div>
            </div>
          </div>
          <div class="search-wrap">
            <input id="search-input" type="text" placeholder="SEARCH OPERATORS..." />
            <span class="search-icon">&#9906;</span>
          </div>
        </div>
        <div class="game-tabs" id="game-tabs"></div>
      </div>
    </header>
    <main>
      <div class="controls">
        <div class="cross-legend"><span class="cross-dot">N</span>CROSS-GAME</div>
        <div style="flex:1"></div>
        <span class="ops-count" id="ops-count"></span>
        <button class="view-btn active" id="btn-grid">&#8862;</button>
        <button class="view-btn"        id="btn-list">&#8801;</button>
      </div>
      <div class="game-banner" id="game-banner">
        <span class="game-banner-year" id="banner-year"></span>
        <span class="game-banner-name" id="banner-name"></span>
      </div>
      <div id="empty-msg">NO OPERATORS FOUND</div>
      <div id="grid-view"></div>
      <div id="list-view"></div>
    </main>
    <footer>COD OPERATOR REGISTRY &middot; MWII &middot; MWIII &middot; BO6 &middot; BO7</footer>
  </div>

  <div id="view-detail">
    <div class="detail-glow" id="detail-glow"></div>
    <div class="detail-content">
      <div class="back-bar">
        <button class="back-btn" id="back-btn">&#8592; BACK</button>
        <span class="breadcrumb" id="detail-breadcrumb"></span>
      </div>

      <!-- // OPERATOR BIO header -->
      <div class="bio-header">// <span>OPERATOR BIO</span></div>

      <div class="detail-layout">
        <!-- Portrait column -->
        <div class="detail-portrait-col">
          <div class="detail-portrait" id="detail-portrait"></div>
          <div class="detail-game-badges" id="detail-game-badges"></div>
        </div>

        <!-- Bio column -->
        <div class="detail-bio-col">
          <div class="bio-name-block">
            <div class="bio-field-label">NAME</div>
            <div class="bio-name" id="detail-name"></div>
            <div class="bio-iname" id="detail-iname" style="display:none"></div>
          </div>

          <div class="bio-row">
            <div class="bio-cell">
              <div class="bio-cell-label">CITIZENSHIP</div>
              <div class="bio-cell-value" id="bio-citizenship">&#8212;</div>
            </div>
            <div class="bio-cell">
              <div class="bio-cell-label">LANGUAGE</div>
              <div class="bio-cell-value" id="bio-language">&#8212;</div>
            </div>
          </div>

          <div class="bio-row">
            <div class="bio-cell">
              <div class="bio-cell-label">FACTION AFFILIATION</div>
              <div class="bio-cell-value" id="bio-faction">&#8212;</div>
            </div>
            <div class="bio-cell">
              <div class="bio-cell-label">STATUS</div>
              <div class="bio-cell-value" id="bio-status">&#8212;</div>
            </div>
          </div>

          <div class="bio-background">
            <div class="bio-bg-label">BACKGROUND</div>
            <div class="bio-bg-text" id="bio-background"></div>
          </div>
        </div>
      </div>

      <!-- Skins -->
      <div class="skins-header">
        <span class="skins-label" id="skins-label">&#9672; APPEARANCES</span>
        <span class="skins-count" id="skins-count"></span>
        <div class="skins-line"></div>
      </div>
      <div class="skins-grid" id="skins-grid"></div>
    </div>
  </div>
</div>



<script>

// ── Helpers ───────────────────────────────────────────────────────────────────
function ini(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }

function badge(gameKey,small){
  const g=GAMES[gameKey]; if(!g) return "";
  return '<span class="game-badge '+(small?"sm":"md")+'" style="color:'+g.color+';border:1px solid '+g.color+'44;background:'+g.color+'18">'+g.short+'</span>';
}

function apLine(ap){
  return '<div class="appearance-line">'+badge(ap.game,true)+(ap.season?'<span class="season-tag">'+ap.season+'</span>':'')+'</div>';
}

function patternSVG(seed,color){
  let r=seed*9301+49297;
  const rng=()=>{ r=(r*9301+49297)%233280; return r/233280; };
  let s="";
  for(let i=0;i<6;i++){
    const x=rng()*100,y=rng()*100,sz=15+rng()*35,t=Math.floor(rng()*3);
    if(t===0) s+='<rect x="'+(x-sz/2)+'" y="'+(y-sz/2)+'" width="'+sz+'" height="'+sz+'" fill="'+color+'" transform="rotate('+(sz*3)+' '+x+' '+y+')"/>';
    else if(t===1) s+='<circle cx="'+x+'" cy="'+y+'" r="'+(sz/2)+'" fill="'+color+'"/>';
    else s+='<polygon points="'+x+','+(y-sz/2)+' '+(x+sz/2)+','+(y+sz/2)+' '+(x-sz/2)+','+(y+sz/2)+'" fill="'+color+'"/>';
  }
  return '<svg class="skin-pattern" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice"><rect width="100" height="100" fill="'+color+'"/>'+s+'</svg>';
}

// ── State ─────────────────────────────────────────────────────────────────────
var S={ game:"all", search:"", view:"grid" };

const gameCount={};
OPERATORS.forEach(op=>{
  const seen=new Set();
  op.appearances.forEach(a=>{ if(!seen.has(a.game)){ gameCount[a.game]=(gameCount[a.game]||0)+1; seen.add(a.game); } });
});
const multiCount=OPERATORS.filter(op=>op.appearances.length>1).length;

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs(){
  const c=document.getElementById("game-tabs");
  c.innerHTML="";
  const allB=document.createElement("button");
  allB.className="game-tab all"+(S.game==="all"?" active-all":"");
  allB.textContent="ALL ("+OPERATORS.length+")";
  allB.onclick=()=>{ S.game="all"; render(); };
  c.appendChild(allB);
  Object.entries(GAMES).forEach(([k,g])=>{
    const b=document.createElement("button");
    b.className="game-tab";
    b.textContent=g.short+" ("+(gameCount[k]||0)+")";
    b.style.color=S.game===k?g.color:"";
    b.style.borderBottomColor=S.game===k?g.color:"transparent";
    b.onclick=()=>{ S.game=k; render(); };
    c.appendChild(b);
  });
}

function getFiltered(){
  return OPERATORS.filter(op=>{
    if(S.game!=="all"&&!op.appearances.some(a=>a.game===S.game)) return false;
    if(S.search){ const q=S.search.toLowerCase(); return op.name.toLowerCase().includes(q)||op.appearances.some(a=>a.faction&&a.faction.toLowerCase().includes(q)); }
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  buildTabs();
  document.getElementById("header-sub").textContent=OPERATORS.length+" OPERATORS \u00b7 "+multiCount+" CROSS-GAME \u00b7 "+Object.keys(GAMES).length+" TITLES";
  const ops=getFiltered();
  document.getElementById("ops-count").textContent=ops.length+" OPS";

  const banner=document.getElementById("game-banner");
  if(S.game!=="all"){
    const g=GAMES[S.game];
    banner.className="game-banner visible";
    banner.style.cssText="display:flex;margin-bottom:16px;padding:10px 16px;align-items:center;gap:12px;background:"+g.color+"0a;border:1px solid "+g.color+"22;border-left:3px solid "+g.color;
    document.getElementById("banner-year").textContent=g.year;
    document.getElementById("banner-year").style.color=g.color;
    document.getElementById("banner-name").textContent="Call of Duty: "+g.name;
  } else { banner.className="game-banner"; banner.style.cssText=""; }

  const gridEl=document.getElementById("grid-view");
  const listEl=document.getElementById("list-view");
  const emptyEl=document.getElementById("empty-msg");
  if(ops.length===0){ emptyEl.style.display="block"; gridEl.style.display="none"; listEl.style.display="none"; return; }
  emptyEl.style.display="none";

  // MW5 faction split
  if(S.game==="mw5"){
    const ac=GAMES.mw5.color;
    const specgru=ops.filter(op=>op.appearances.some(a=>a.game==="mw5"&&a.faction==="SpecGru"));
    const kortac =ops.filter(op=>op.appearances.some(a=>a.game==="mw5"&&a.faction==="KorTac"));

    if(S.view==="grid"){
      gridEl.style.display="block"; listEl.style.display="none";      gridEl.innerHTML=
        '<div class="faction-split">'
        +'<div class="faction-col">'
        +'<div class="faction-header" style="color:'+ac+';border-color:'+ac+'44"><span class="fh-dot" style="background:'+ac+'"></span>SPECGRU</div>'
        +'<div class="faction-col-grid" id="sg-grid">'+specgru.map(op=>cardHTML(op)).join("")+'</div>'
        +'</div>'
        +'<div class="faction-col">'
        +'<div class="faction-header" style="color:'+ac+';border-color:'+ac+'44"><span class="fh-dot" style="background:'+ac+'"></span>KORTAC</div>'
        +'<div class="faction-col-grid" id="kt-grid">'+kortac.map(op=>cardHTML(op)).join("")+'</div>'
        +'</div>'
        +'</div>';
      // attach click listeners across both columns
      const allOps=[...specgru,...kortac];
      gridEl.querySelectorAll(".op-card").forEach((el,i)=>{ el.addEventListener("click",()=>openDetail(allOps[i])); });
    } else {
      gridEl.style.display="none"; listEl.style.display="block"; listEl.style.flexDirection=""; listEl.style.gap="";
      listEl.innerHTML=
        '<div class="faction-split">'
        +'<div class="faction-col">'
        +'<div class="faction-header" style="color:'+ac+';border-color:'+ac+'44"><span class="fh-dot" style="background:'+ac+'"></span>SPECGRU</div>'
        +'<div class="faction-col-list" id="sg-list">'+specgru.map(op=>rowHTML(op)).join("")+'</div>'
        +'</div>'
        +'<div class="faction-col">'
        +'<div class="faction-header" style="color:'+ac+';border-color:'+ac+'44"><span class="fh-dot" style="background:'+ac+'"></span>KORTAC</div>'
        +'<div class="faction-col-list" id="kt-list">'+kortac.map(op=>rowHTML(op)).join("")+'</div>'
        +'</div>'
        +'</div>';
      const allOps=[...specgru,...kortac];
      listEl.querySelectorAll(".list-row").forEach((el,i)=>{ el.addEventListener("click",()=>openDetail(allOps[i])); });
    }
    return;
  }

  if(S.view==="grid"){
    gridEl.style.display="grid"; listEl.style.display="none";
    gridEl.innerHTML=ops.map(op=>cardHTML(op)).join("");
    gridEl.querySelectorAll(".op-card").forEach((el,i)=>{ el.addEventListener("click",()=>openDetail(ops[i])); });
  } else {
    gridEl.style.display="none"; listEl.style.display="flex"; listEl.style.flexDirection="column"; listEl.style.gap="3px";
    listEl.innerHTML=ops.map(op=>rowHTML(op)).join("");
    listEl.querySelectorAll(".list-row").forEach((el,i)=>{ el.addEventListener("click",()=>openDetail(ops[i])); });
  }
}

function cardHTML(op){
  const isM=op.appearances.length>1;
  const vis=S.game!=="all"?op.appearances.filter(a=>a.game===S.game):op.appearances;
  const pg=vis[0]?vis[0].game:op.appearances[0].game;
  const ac=GAMES[pg]?GAMES[pg].color:"#aaa";
  const mb=isM?'<span class="multi-badge">'+op.appearances.length+'</span>':"";
  const inGame=S.game!=="all";
  // Name: use alias when on a specific tab, real name on ALL
  const displayName=inGame?(op.alias||op.name):op.name;
  // Faction + game badges: only on ALL tab
  const fc=!inGame&&vis[0]&&vis[0].faction?'<div class="card-faction">'+vis[0].faction+'</div>':"";
  const apsHTML=!inGame?vis.map(apLine).join(""):"";
  const iname=op.internalName?'<div class="card-iname">'+op.internalName+'</div>':"";
  var avInner;
  if(op.icon){
    avInner='<img src="'+op.icon+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
           +'<span class="av-ini" style="display:none;color:'+ac+'">'+ini(displayName)+'</span>';
  } else {
    avInner='<span class="av-ini" style="color:'+ac+'">'+ini(displayName)+'</span>';
  }
  return '<div class="op-card" style="border-top:2px solid '+ac+'55" data-ac="'+ac+'">'
    +'<div class="card-scanlines"></div>'
    +'<div class="card-inner">'
    +'<div class="card-avatar" style="background:linear-gradient(135deg,'+ac+'22,'+ac+'08);border:1px solid '+ac+'44;font-family:\'Courier New\',monospace;font-weight:700;font-size:13px;letter-spacing:.05em;">'+avInner+mb+'</div>'
    +'<div class="card-info"><div class="card-name">'+displayName+'</div>'+fc+iname+apsHTML+'</div>'
    +'</div></div>';
}

function rowHTML(op){
  const vis=S.game!=="all"?op.appearances.filter(a=>a.game===S.game):op.appearances;
  const ac=GAMES[vis[0]?vis[0].game:""]?GAMES[vis[0].game].color:"#aaa";
  const inGame=S.game!=="all";
  const displayName=inGame?(op.alias||op.name):op.name;
  const faction=!inGame?(vis[0]?vis[0].faction:""):"";
  const aps=!inGame?vis.map(ap=>'<div class="list-ap">'+(ap.season?'<span class="season-tag">'+ap.season+'</span>':"")+badge(ap.game,true)+'</div>').join(""):"";
  return '<div class="list-row" style="border-left:3px solid '+ac+'44" data-ac="'+ac+'">'
    +'<span class="list-name">'+displayName+'</span>'
    +'<span class="list-faction">'+faction+'</span>'
    +'<div class="list-aps">'+aps+'</div></div>';
}

// hover delegation
document.addEventListener("mouseover",function(e){
  const r=e.target.closest(".list-row"); if(r) r.style.borderLeftColor=r.dataset.ac;
  const c=e.target.closest(".op-card"); if(c){ c.style.borderTopColor=c.dataset.ac; c.style.boxShadow="0 8px 32px "+c.dataset.ac+"22"; c.style.transform="translateY(-2px)"; }
  const s=e.target.closest(".skin-card"); if(s){ s.style.borderColor=s.dataset.gc+"88"; s.style.boxShadow="0 8px 32px "+s.dataset.gc+"33"; }
});
document.addEventListener("mouseout",function(e){
  const r=e.target.closest(".list-row"); if(r) r.style.borderLeftColor=r.dataset.ac+"44";
  const c=e.target.closest(".op-card"); if(c){ c.style.borderTopColor=c.dataset.ac+"55"; c.style.boxShadow=""; c.style.transform=""; }
  const s=e.target.closest(".skin-card"); if(s){ s.style.borderColor=s.dataset.gc+"33"; s.style.boxShadow=""; }
});

// ── Detail ────────────────────────────────────────────────────────────────────
function openDetail(op){
  document.getElementById("view-registry").style.display="none";
  var dv=document.getElementById("view-detail");
  dv.style.display="block"; dv.classList.add("page-in");
  setTimeout(function(){ dv.classList.remove("page-in"); },200);

  var pg=op.appearances[0].game;
  var ac=GAMES[pg]?GAMES[pg].color:"#aaa";
  var isM=op.appearances.length>1;

  // glow
  document.getElementById("detail-glow").style.background=
    "radial-gradient(ellipse 80% 400px at 50% -80px,"+ac+"14 0%,transparent 70%)";
  document.getElementById("detail-breadcrumb").textContent="OPERATOR REGISTRY / "+(op.alias||op.name).toUpperCase();

  // portrait
  var port=document.getElementById("detail-portrait");
  port.style.background="linear-gradient(160deg,"+ac+"22,"+ac+"06)";
  port.style.border="1px solid "+ac+"33";
  if(op.icon){
    port.innerHTML='<img src="'+op.icon+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
      +'<div class="av-ini" style="display:none;color:'+ac+'">'+ini(op.name)+'</div>'
      +(isM?'<div class="detail-portrait-badge">'+op.appearances.length+'</div>':"");
  } else {
    port.innerHTML='<div class="av-ini" style="color:'+ac+'">'+ini(op.name)+'</div>'
      +(isM?'<div class="detail-portrait-badge">'+op.appearances.length+'</div>':"");
  }

  // game badges
  var uniqG=[...new Set(op.appearances.map(function(a){return a.game;}))];
  document.getElementById("detail-game-badges").innerHTML=uniqG.map(function(g){
    return '<div class="detail-game-badge-row" style="border-color:'+GAMES[g].color+'33;background:'+GAMES[g].color+'0a">'+badge(g,false)+'</div>';
  }).join("");

  // name
  document.getElementById("detail-name").textContent=(op.alias||op.name);
  var dn=document.getElementById("detail-iname");
  if(dn){ dn.textContent=op.internalName?"// "+op.internalName:""; dn.style.display=op.internalName?"block":"none"; }

  // bio fields
  var b=op.bio||{};
  var faction=op.appearances[0].faction||"—";

  document.getElementById("bio-citizenship").textContent=b.citizenship||"—";
  document.getElementById("bio-language").textContent=b.language||"—";
  document.getElementById("bio-faction").textContent=b.faction||faction;

  var statusEl=document.getElementById("bio-status");
  var statusVal=b.status||"—";
  statusEl.textContent=statusVal;
  statusEl.className="bio-cell-value";
  if(statusVal==="Active")  statusEl.classList.add("status-active");
  else if(statusVal==="KIA") statusEl.classList.add("status-kia");
  else if(statusVal!=="—")   statusEl.classList.add("status-unknown");

  // background text (supports \n for paragraph breaks)
  var bgEl=document.getElementById("bio-background");
  if(b.background){
    bgEl.innerHTML=b.background.split("\n").filter(function(l){return l.trim();}).map(function(p){
      return '<p>'+p+'</p>';
    }).join("");
  } else {
    bgEl.innerHTML='<span class="bio-classified">// BACKGROUND CLASSIFIED</span>';
  }

  // skins
  document.getElementById("skins-label").style.color=ac;
  var opSkins=SKINS[op.id]||[];
  document.getElementById("skins-count").textContent=opSkins.length+" SKIN"+(opSkins.length!==1?"S":"");
  if(opSkins.length===0){
    document.getElementById("skins-grid").innerHTML='<div style="font-family:\'Courier New\',monospace;font-size:10px;color:#2a3040;letter-spacing:.12em;padding:12px 0">// NO SKIN DATA</div>';
  } else {
    document.getElementById("skins-grid").innerHTML=opSkins.map(function(skinPath){
      var fname=skinPath.split('/').pop().replace('.png','');
      // Named label first, fallback to cleaned filename
      var label=SKIN_NAMES[fname]||fname
        .replace('ui_loot_operator_east_','')
        .replace('ui_loot_operator_west_','')
        .replace(/_lg$/,'')
        .replace(/_bc$/,' BC')
        .replace(/_/g,' ')
        .toUpperCase();
      var seed=skinPath.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0);
      return '<div class="skin-card" style="border-color:'+ac+'33" data-gc="'+ac+'">'
        +'<img class="skin-bg" src="'+skinPath+'" alt="" onerror="this.style.display=\'none\'">'
        +'<div class="skin-overlay"></div>'
        +'<div class="skin-name">'+label+'</div>'
        +'</div>';
    }).join("");
  }

  window.scrollTo(0,0);
}

document.getElementById("back-btn").addEventListener("click",function(){
  document.getElementById("view-detail").style.display="none";
  document.getElementById("view-registry").style.display="block";
});
document.getElementById("back-btn").addEventListener("mouseenter",function(){
  var ac=(document.getElementById("detail-glow").style.background.match(/#[0-9a-f]{6}/i)||["#8899ff"])[0];
  this.style.borderColor=ac; this.style.color=ac;
});
document.getElementById("back-btn").addEventListener("mouseleave",function(){ this.style.borderColor=""; this.style.color=""; });

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById("search-input").addEventListener("input",function(e){ S.search=e.target.value; render(); });
document.getElementById("btn-grid").addEventListener("click",function(){ S.view="grid"; this.classList.add("active"); document.getElementById("btn-list").classList.remove("active"); render(); });
document.getElementById("btn-list").addEventListener("click",function(){ S.view="list"; this.classList.add("active"); document.getElementById("btn-grid").classList.remove("active"); render(); });

render();
</script>
</body>
</html>
